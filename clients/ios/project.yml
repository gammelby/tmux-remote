name: NabtoShell
options:
  bundleIdPrefix: com.nabto
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
settings:
  SWIFT_VERSION: "5.9"
  IPHONEOS_DEPLOYMENT_TARGET: "17.0"
packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm.git
    from: "1.0.0"
targets:
  NabtoShell:
    type: application
    platform: iOS
    sources:
      - NabtoShell
    dependencies:
      - package: SwiftTerm
    settings:
      INFOPLIST_FILE: NabtoShell/Info.plist
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      PRODUCT_BUNDLE_IDENTIFIER: com.nabto.NabtoShell
      TARGETED_DEVICE_FAMILY: "1,2"
      CODE_SIGN_STYLE: Automatic
  NabtoShellTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - NabtoShellTests
    dependencies:
      - target: NabtoShell
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.nabto.NabtoShellTests
      GENERATE_INFOPLIST_FILE: YES
  NabtoShellUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - NabtoShellUITests
    dependencies:
      - target: NabtoShell
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.nabto.NabtoShellUITests
      GENERATE_INFOPLIST_FILE: YES
